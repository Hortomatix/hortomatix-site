<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hortomatix: Software for the green industry</title>
<meta name="description" content="Hortomatix builds software for horticulture, landscaping, wholesale trade, retail gardening, and professional grounds management. For the people who grow.">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/logos/favicon-32.png?v=2">
<link rel="icon" type="image/png" sizes="512x512" href="/assets/logos/favicon.png?v=2">
<link rel="apple-touch-icon" sizes="180x180" href="/assets/logos/favicon-180.png?v=2">

<!-- Open Graph / social sharing -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://hortomatix.com.au/">
<meta property="og:title" content="Hortomatix: Software for the green industry">
<meta property="og:description" content="Connected software for horticulture, landscaping, wholesale trade, retail gardening, and professional grounds management.">
<meta property="og:site_name" content="Hortomatix">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e0c;
    --bg-card: #11161a;
    --ink: #e8efe8;
    --ink-soft: #a8b3ad;
    --green: #00e87a;
    --line: rgba(232, 239, 232, 0.08);
    --line-strong: rgba(232, 239, 232, 0.16);
    --sans: "Manrope", system-ui, sans-serif;
    --mono: "JetBrains Mono", monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--ink); font-family: var(--sans); font-size: 16px; line-height: 1.55; -webkit-font-smoothing: antialiased; overflow-x: hidden;
        background-image: radial-gradient(circle at 10% -10%, rgba(0, 232, 122, 0.04), transparent 50%);
        background-attachment: fixed; }
  a { color: inherit; text-decoration: none; }
  .container { max-width: 1280px; margin: 0 auto; padding: 0 40px; }

  /* Nav */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10, 14, 12, 0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--line);
  }
  .nav-inner {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 40px; max-width: 1280px; margin: 0 auto;
  }
  .logo {
    display: flex; align-items: center; gap: 6px;
    font-weight: 700; font-size: 22px; letter-spacing: -0.02em;
  }
  .logo-mark {
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin: -4px 0;
  }
  .logo-mark img {
    width: 100%; height: 100%; display: block;
    /* Soft green glow to match the rest of the green-glowing accents */
    filter: drop-shadow(0 0 8px rgba(0, 232, 122, 0.35));
  }
  .nav-right { display: flex; align-items: center; gap: 16px; }
  .nav-cta {
    font-family: var(--mono); font-size: 13px; font-weight: 500;
    padding: 8px 16px;
    background: var(--green); color: var(--bg);
    border-radius: 6px;
    transition: all 0.15s;
  }
  .nav-cta:hover { background: #1aff9a; }

  /* Hero */
  .hero {
    padding: 80px 0 120px; position: relative; overflow: hidden;
    min-height: calc(100vh - 77px);
    display: flex; align-items: center;
  }
  .hero::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 600px;
    background: radial-gradient(ellipse at 50% 0%, rgba(0, 232, 122, 0.08), transparent 70%);
    pointer-events: none; z-index: 1;
  }
  .hero-backdrop {
    position: absolute;
    top: 0; right: 0; bottom: 0;
    width: 55%;
    filter: grayscale(100%) contrast(0.95) brightness(0.85);
    -webkit-mask-image:
      linear-gradient(to right, transparent 0%, rgba(0,0,0,0.4) 35%, black 100%),
      linear-gradient(to bottom, black 0%, black 70%, transparent 100%);
    -webkit-mask-composite: source-in;
    mask-image:
      linear-gradient(to right, transparent 0%, rgba(0,0,0,0.4) 35%, black 100%),
      linear-gradient(to bottom, black 0%, black 70%, transparent 100%);
    mask-composite: intersect;
    pointer-events: none;
    z-index: 0;
  }
  .hero-backdrop-img {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center right;
    background-repeat: no-repeat;
    opacity: 0;
    transition: opacity 2s ease-in-out;
  }
  .hero-backdrop-img.is-active {
    opacity: 0.30;
  }
  .hero > .container { position: relative; z-index: 2; }
  .hero h1 {
    font-weight: 700;
    font-size: clamp(44px, 6.5vw, 88px);
    line-height: 1.02;
    letter-spacing: -0.035em;
    color: var(--ink);
    max-width: 980px;
    margin-bottom: 28px;
  }
  .hero h1 .accent { color: var(--green); }
  .hero-lede {
    font-size: 19px; color: var(--ink-soft); line-height: 1.55;
    max-width: 680px;
  }

  @media (max-width: 860px) {
    .container, .nav-inner { padding: 0 20px; }
    .nav-inner { padding: 14px 20px; }
    .hero { padding: 48px 0 60px; min-height: 0; }
    .hero-backdrop { display: none; }
  }
</style>
</head>
<body id="top">

<nav>
  <div class="nav-inner">
    <a href="#top" class="logo">
      <span class="logo-mark"><img src="/assets/logos/icon-green-nav.png" alt="Hortomatix"></span>
      Hortomatix
    </a>
    <div class="nav-right">
      <a href="mailto:info@hortomatix.com.au?subject=Hortomatix%20-%20Get%20in%20touch" class="nav-cta">Get in touch</a>
    </div>
  </div>
</nav>

<header class="hero">
  <div class="hero-backdrop" aria-hidden="true">
    <div class="hero-backdrop-img is-active" style="background-image:url('/assets/hero-people.jpg');" data-index="0"></div>
    <div class="hero-backdrop-img" data-src="/assets/hero-people-2.jpg" data-index="1"></div>
    <div class="hero-backdrop-img" data-src="/assets/hero-people-3.jpg" data-index="2"></div>
    <div class="hero-backdrop-img" data-src="/assets/hero-people-4.jpg?v=3" data-index="3"></div>
    <div class="hero-backdrop-img" data-src="/assets/hero-people-5.jpg" data-index="4"></div>
  </div>
  <div class="container">
    <h1>Intelligent tools for the <span class="accent">people who grow.</span></h1>
    <p class="hero-lede">
      Hortomatix builds software for horticulture, landscaping, wholesale trade, retail gardening, and professional grounds management. Each product is designed to solve a real problem for the people who use it.
    </p>
  </div>
</header>

<script>
  // Hero backdrop rotation: lazy-load images, then cycle through with crossfade.
  // Pacing: 10s per image, 2s crossfade.
  (function () {
    var slides = document.querySelectorAll('.hero-backdrop-img');
    if (slides.length < 2) return;

    function lazyLoad() {
      for (var i = 1; i < slides.length; i++) {
        var src = slides[i].getAttribute('data-src');
        if (src) {
          slides[i].style.backgroundImage = "url('" + src + "')";
          slides[i].removeAttribute('data-src');
        }
      }
    }

    // Lazy-load on idle, falling back to a delayed timeout on browsers without rIC.
    if ('requestIdleCallback' in window) {
      requestIdleCallback(lazyLoad, { timeout: 1500 });
    } else {
      setTimeout(lazyLoad, 1500);
    }

    // Honour the user's reduced-motion preference: no rotation.
    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      return;
    }

    var current = 0;
    setInterval(function () {
      slides[current].classList.remove('is-active');
      current = (current + 1) % slides.length;
      slides[current].classList.add('is-active');
    }, 10000);
  })();
</script>
</body>
</html>
